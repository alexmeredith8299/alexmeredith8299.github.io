- "July 2025: I presented our work (with Naman Aggarwal, Christopher Jewison, and Jonathan P. How) [REVISE: Robust Probabilistic Motion Planning in a Gaussian Random Field](https://arxiv.org/abs/2411.13369) at the American Control Conference (ACC) 2025 in Denver, CO."
