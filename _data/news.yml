- "October 2025: Our new preprint (with Naman Aggarwal, Christopher Jewison, and Jonathan P. How), [Efficient Probabilistic Planning with Maximum-Coverage Distributionally Robust Backward Reachable Trees](https://arxiv.org/abs/2510.04807), is now available on arXiv."
